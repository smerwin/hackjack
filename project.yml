name: Hackjack
options:
  bundleIdPrefix: com.smerwin
  deploymentTarget:
    iOS: "17.0"
packages:
  HackjackLocal:
    path: .
targets:
  Hackjack:
    type: application
    platform: iOS
    sources:
      - path: Sources/HackjackApp
      - path: Sources/HackjackApp/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: HackjackLocal
        product: HackjackCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smerwin.hackjack
        PRODUCT_NAME: Hackjack
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Hackjack
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q2GAZA687V
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.2"
        CURRENT_PROJECT_VERSION: "1"
