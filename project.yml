name: Hackjack
options:
  bundleIdPrefix: com.hackjack
  deploymentTarget:
    iOS: "17.0"
packages:
  HackjackLocal:
    path: .
targets:
  Hackjack:
    type: application
    platform: iOS
    sources:
      - path: Sources/HackjackApp
    dependencies:
      - package: HackjackLocal
        product: HackjackCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hackjack.app
        PRODUCT_NAME: Hackjack
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Hackjack
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.2"
        CURRENT_PROJECT_VERSION: "1"
